<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIBARI CHAT</title>
    <style>
        body{
            margin:0;
            min-height:100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:#070707;
            color:#fff;
        }

        .app-wrapper{
            display:flex;
            min-height:100vh;
            padding-top: 8px;
        }

        .sidebar{
            position:sticky;
            top:0;
            left:0;
            bottom:0;
            width:320px;
            padding:24px;
            background:#121212;
            box-sizing:border-box;
            border-right:1px solid rgba(255,255,255,0.06);
            overflow-y:auto;
            align-self:flex-start;
            height:100vh;
        }

        .sidebar-header{
            font-size:18px;
            font-weight:700;
            margin-bottom:20px;
            cursor:pointer;
        }

        .room-list{
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .room-item{
            padding:16px;
            border-radius:16px;
            background:#1a1a1a;
            cursor:pointer;
            transition:background .2s ease;
        }

        .room-item:hover{
            background:#242424;
        }

        .room-name{
            font-size:15px;
            margin-bottom:6px;
        }

        .room-date{
            font-size:13px;
            color:#999;
        }

        .main{
            flex:1;
            display:flex;
            flex-direction:column;
            min-height:100vh;
            background:#090909;
        }

        .chat-header{
            padding:24px;
            border-bottom:1px solid rgba(255,255,255,0.06);
            font-size:20px;
            font-weight:700;
        }

        .chat-area{
            flex:1;
            overflow-y:auto;
            padding:24px;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .input-area{
            display:flex;
            gap:12px;
            padding:20px 24px 24px;
            background:#090909;
        }

        .message-input{
            flex:1;
            padding:14px 16px;
            border-radius:999px;
            border:1px solid rgba(255,255,255,0.08);
            background:#101010;
            color:#fff;
            outline:none;
            font-size:14px;
        }

        .send-button{
            padding:0 24px;
            border:none;
            border-radius:999px;
            background:#d8b65b;
            color:#111;
            font-weight:700;
            cursor:pointer;
        }

        .send-button:hover{
            opacity:0.9;
        }

        .message{
            max-width:75%;
            padding:14px 16px;
            border-radius:18px;
            word-break:break-word;
            line-height:1.6;
        }

        .user-message{
            margin-left:auto;
            background:#1f1f1f;
        }

        .assistant-message{
            margin-right:auto;
            background:#191919;
        }
    </style>
</head>
<body>
{% include '_debug_auth.html' %}

    <div class="app-wrapper">

        <div class="sidebar">

            <div class="sidebar-header" onclick="startNewChat()">
                HIBARI CHAT
            </div>

            <div class="room-list" id="roomList"></div>

        </div>

        <div class="main">

            <div class="chat-header" id="chatHeader">
                新しいチャット
            </div>

            <div class="chat-area" id="chatArea"></div>

            <div class="input-area">
                <input
                    type="text"
                    id="messageInput"
                    class="message-input"
                    placeholder="メッセージを入力..."
                >

                <button
                    class="send-button"
                    onclick="sendMessage()"
                >
                    送信
                </button>
            </div>

        </div>

    </div>

    <script>

        let currentRoomId = null;

        async function sendMessage(){

            const input = document.getElementById("messageInput");
            const message = input.value.trim();

            if(!message){
                return;
            }

            addMessage("user", message);
            input.value = "";

            const formData = new FormData();
            formData.append("message", message);

            if(currentRoomId){
                formData.append("room_id", currentRoomId);
            }

            try {
                const response = await fetch("/api/chat", {
                    method:"POST",
                    body:formData
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    if (response.status === 401 && data.redirect) {
                        window.location.href = data.redirect;
                        return;
                    }
                    addMessage("assistant", data.error || "送信に失敗しました");
                    return;
                }

                if (data.room_id && Number(data.room_id) > 0) {
                    currentRoomId = Number(data.room_id);
                }

                if (data.room_name) {
                    setChatHeader(data.room_name);
                }

                addMessage("assistant", data.message || "(空の応答)");
                loadRooms();
            } catch (err) {
                addMessage("assistant", "送信に失敗しました: " + (err.message || err));
            }
        }

        function addMessage(role, content){
            const chatArea = document.getElementById("chatArea");
            const messageDiv = document.createElement("div");

            messageDiv.classList.add("message");
            if(role === "user"){
                messageDiv.classList.add("user-message");
            } else {
                messageDiv.classList.add("assistant-message");
            }

            messageDiv.textContent = content;
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function setChatHeader(name) {
            const chatHeader = document.getElementById("chatHeader");
            chatHeader.textContent = name || "新しいチャット";
        }

        function startNewChat() {
            currentRoomId = null;
            setChatHeader("新しいチャット");

            const chatArea = document.getElementById("chatArea");
            chatArea.innerHTML = "";

            const messageInput = document.getElementById("messageInput");
            messageInput.value = "";
            messageInput.focus();
        }

        async function loadRooms(){
            const response = await fetch("/api/rooms");
            const rooms = await response.json().catch(() => ({}));

            const roomList = document.getElementById("roomList");
            roomList.innerHTML = "";

            if (!response.ok) {
                if (response.status === 401 && rooms.redirect) {
                    window.location.href = rooms.redirect;
                }
                return;
            }

            if (!Array.isArray(rooms)) {
                return;
            }

            rooms.forEach(room => {
                const div = document.createElement("div");
                div.className = "room-item";
                div.innerHTML = `
                    <div class="room-name">${room.room_name}</div>
                    <div class="room-date">${room.created_at}</div>
                `;
                div.onclick = () => {
                    loadMessages(room.ai_chat_room_id, room.room_name);
                };
                roomList.appendChild(div);
            });
        }

        async function loadMessages(roomId, roomName){
            currentRoomId = roomId;
            setChatHeader(roomName);

            const response = await fetch(`/api/messages/${roomId}`);
            const messages = await response.json();

            const chatArea = document.getElementById("chatArea");
            chatArea.innerHTML = "";

            messages.forEach(message => {
                addMessage(message.sender, message.content);
            });
        }

        loadRooms();

    </script>
</body>
</html>
